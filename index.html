<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffeef2;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Floating background hearts */
        .heart-bg {
            position: absolute;
            color: #ffb3c6;
            font-size: 24px;
            animation: floatUp 4s infinite linear;
            opacity: 0.6;
            z-index: 0;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .container {
            background: white;
            padding: 30px 35px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 154, 178, 0.3);
            max-width: 420px;
            width: 90%;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .gif-container img {
            width: 170px;
            height: 170px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff477e;
            font-size: 26px;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .message {
            color: #6c757d;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 25px;
            min-height: 48px;
            padding: 0 10px;
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            height: 60px;
        }

        button {
            border: none;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .yes-btn {
            background-color: #2ec4b6;
            color: white;
            z-index: 100;
        }

        .yes-btn:hover {
            background-color: #259e93;
            transform: scale(1.08);
        }

        .no-btn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
            transition: all 0.15s ease-out;
        }

        .hidden {
            display: none !important;
        }

        .success h1 {
            color: #2ec4b6;
        }
    </style>
</head>
<body>

    <div id="heart-spawner"></div>

    <div class="container" id="main-card">
        <div class="gif-container">
            <img id="cute-gif" src="https://media.tenor.com/7S8YgZ-N_XQAAAAi/sad-cry.gif" alt="Please forgive me">
        </div>
        <h1 id="main-heading">Dishita, I'm so sorry... 🥺</h1>
        <p class="message" id="apology-text">To the love of my life: Can you please forgive me? I promise to make it up to you! 💖</p>

        <div class="btn-wrapper" id="buttons">
            <button class="yes-btn" id="yesBtn" onclick="forgiven()">Yes</button>
            <button class="no-btn" id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <div class="container hidden" id="success-card">
        <div class="gif-container">
            <img src="https://media.tenor.com/mSshv30f0Q0AAAAi/peach-goma.gif" alt="Happy couple">
        </div>
        <h1>Yay! Thank you, Dishita! 🥰</h1>
        <p class="message">You truly are the love of my life and the sweetest person ever! I love you so much! ❤️✨</p>
    </div>

    <script>
        // Cute, personalized messages when she hovers over "No"
        const messages = [
            "Wait, are you sure? 🥺",
            "Dishita, pretty please? 🌸",
            "What if I bring you your favorite snacks? 🍕",
            "Don't do this to me! 😭",
            "Click the green button, love! 👉",
            "Think about how much I adore you!",
            "I'm gonna keep running! 🏃‍♂️",
            "Please forgive me? 💖",
            "Okay, now you're just teasing me! 😂",
            "Just say YES already, my love! 🥰"
        ];

        let clickCount = 0;
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const textMsg = document.getElementById('apology-text');

        // Makes the No button move away when hovered or clicked
        function moveNoButton() {
            textMsg.innerText = messages[clickCount % messages.length];
            clickCount++;

            // Yes button grows slightly to make clicking it easier
            let currentScale = 1 + (clickCount * 0.12);
            yesBtn.style.transform = `scale(${currentScale})`;

            // Constrain movement within the container
            const container = document.getElementById('main-card');
            const maxX = (container.clientWidth / 2) - noBtn.clientWidth;
            const maxY = (container.clientHeight / 2) - noBtn.clientHeight;

            const randomX = Math.floor(Math.random() * (maxX * 2)) - maxX;
            const randomY = Math.floor(Math.random() * (maxY * 1.2)) - maxY;

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // When the Yes button is clicked
        function forgiven() {
            document.getElementById('main-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');

            // Launch a long, continuous confetti celebration
            const duration = 3.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff477e', '#ffb3c6', '#2ec4b6']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff477e', '#ffb3c6', '#2ec4b6']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Floating hearts effect
        function createHearts() {
            const spawner = document.getElementById('heart-spawner');
            const heartEmojis = ['💖', '🌸', '✨', '💕'];
            for (let i = 0; i < 18; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.animationDuration = 3 + Math.random() * 2.5 + 's';
                spawner.appendChild(heart);
            }
        }
        createHearts();
    </script>
</body>
</html>
