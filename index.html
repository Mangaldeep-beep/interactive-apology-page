<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Dishita, My Love 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffeef2;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Ambient Floating Hearts */
        .heart-bg {
            position: absolute;
            color: #ffb3c6;
            font-size: 24px;
            animation: floatUp 4.5s infinite linear;
            opacity: 0.6;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.6) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-15vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        /* Glassmorphism main container */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 30px;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(255, 133, 162, 0.25);
            max-width: 400px;
            width: 88%;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 192, 203, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gif-container {
            width: 100%;
            height: 170px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 18px;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff477e;
            font-size: 26px;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .message {
            color: #6c757d;
            font-weight: 700;
            font-size: 15.5px;
            margin-bottom: 25px;
            min-height: 52px;
            line-height: 1.4;
        }

        /* Fixed-height wrapper prevents card shifting */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            width: 100%;
            height: 65px;
        }

        button {
            border: none;
            padding: 12px 34px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .yes-btn {
            background-color: #2ec4b6;
            color: white;
            z-index: 100;
        }

        .yes-btn:hover {
            background-color: #23a89c;
            transform: scale(1.08);
        }

        .no-btn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .hidden {
            display: none !important;
        }

        .success h1 {
            color: #2ec4b6;
        }
    </style>
</head>
<body>

    <div id="heart-spawner"></div>

    <div class="container" id="main-card">
        <div class="gif-container">
            <img id="cute-gif" src="https://media.tenor.com/7S8YgZ-N_XQAAAAi/sad-cry.gif" alt="Pleading GIF">
        </div>
        <h1 id="main-heading">Dishita, I'm so sorry... 🥺</h1>
        <p class="message" id="apology-text">To the love of my life: Can you please forgive me? I promise to make it up to you! 💖</p>

        <div class="btn-wrapper" id="buttons">
            <button class="yes-btn" id="yesBtn" onclick="forgiven()">Yes</button>
            <button class="no-btn" id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <div class="container hidden" id="success-card">
        <div class="gif-container">
            <img src="https://media.tenor.com/mSshv30f0Q0AAAAi/peach-goma.gif" alt="Happy couple GIF">
        </div>
        <h1>Yay! Thank you, Dishita! 🥰</h1>
        <p class="message">You are the absolute love of my life! I'm so lucky to have you. I love you so much! ❤️✨</p>
    </div>

    <script>
        // Rotating text to make the 'No' button run even more fun
        const messages = [
            "Wait, are you sure? 🥺",
            "Dishita, pretty please? 🌸",
            "What if I bring you your favorite snacks? 🍕",
            "Don't do this to me! 😭",
            "Click the green button, love! 👉",
            "Think about how much I adore you!",
            "I'm gonna keep running! 🏃‍♂️",
            "Please forgive me? 💖",
            "Okay, now you're just teasing me! 😂",
            "Just say YES already, my love! 🥰"
        ];

        let clickCount = 0;
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const textMsg = document.getElementById('apology-text');

        // Moves the NO button randomly within safe layout limits
        function moveNoButton() {
            textMsg.innerText = messages[clickCount % messages.length];
            clickCount++;

            // Grow the Yes button to make it a bigger, easier target
            let currentScale = 1 + (clickCount * 0.12);
            yesBtn.style.transform = `scale(${currentScale})`;

            const container = document.getElementById('main-card');
            
            // Constrain button inside the card box safely
            const padding = 20;
            const maxX = (container.clientWidth / 2) - noBtn.clientWidth;
            const maxY = (container.clientHeight / 2) - noBtn.clientHeight;

            // Generate clean random bounds within card dimensions
            const randomX = Math.floor(Math.random() * (maxX * 2 - padding)) - (maxX - padding/2);
            const randomY = Math.floor(Math.random() * (maxY * 1.2 - padding)) - (maxY - padding/2);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // Action when Yes button is clicked
        function forgiven() {
            document.getElementById('main-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');

            // Trigger beautiful dual-burst confetti
            const duration = 3500;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff477e', '#ffb3c6', '#2ec4b6']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff477e', '#ffb3c6', '#2ec4b6']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Ambient background effect
        function createHearts() {
            const spawner = document.getElementById('heart-spawner');
            const heartEmojis = ['💖', '🌸', '✨', '💕'];
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.animationDuration = 3.5 + Math.random() * 2 + 's';
                spawner.appendChild(heart);
            }
        }
        createHearts();
    </script>
</body>
</html>
